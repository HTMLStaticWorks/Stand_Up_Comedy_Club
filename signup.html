<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Comedy Hub</title>
    
        <link rel="icon" type="image/svg+xml" href="assets/logo/favicon-32x32.svg">
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="assets/logo/favicon-16x16.svg">
    <link rel="icon" type="image/svg+xml" sizes="48x48" href="assets/logo/favicon-48x48.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/rtl.css" media="all">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 1)), url('https://images.unsplash.com/photo-1543007631-283050bb3e8c?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
            background-blend-mode: multiply;
        }
        
        .auth-card {
            width: 100%;
            max-width: 520px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: var(--space-8) var(--space-6);
            box-shadow: var(--shadow-lg), var(--shadow-neon);
            transition: all var(--transition-normal);
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card:hover {
            box-shadow: 0 40px 80px -12px rgba(0, 0, 0, 0.7), var(--shadow-neon-hover);
            border-color: rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: var(--space-5);
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--space-2);
            display: block;
        }

        .form-control {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            width: 100%;
            transition: all var(--transition-fast);
        }

        .form-control:focus {
            background: rgba(2, 6, 23, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.15);
            outline: none;
            transform: scale(1.01);
        }

        .btn-primary {
            padding: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: var(--shadow-glow);
            margin-top: var(--space-4);
        }

        .social-divider {
            display: flex;
            align-items: center;
            margin: var(--space-8) 0;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-divider::before, .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-divider::before { margin-right: 1.5rem; }
        .social-divider::after { margin-left: 1.5rem; }

        .social-buttons {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .btn-social {
            flex: 1;
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: all var(--transition-normal);
            font-size: 0.875rem;
            white-space: nowrap;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-8);
            padding-top: var(--space-6);
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 700;
            margin-left: 4px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: var(--space-4) 0 var(--space-6);
            font-size: 0.875rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color var(--transition-fast);
            line-height: 1.4;
        }

        .checkbox-container:hover {
            color: var(--text-primary);
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .form-feedback {
            font-size: 0.8125rem;
            color: #ff4d4d;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        .has-error .form-feedback { display: block; }
        .has-error .form-control { border-color: #ff4d4d; background: rgba(255, 77, 77, 0.05); }
    </style>
</head>
<body style="position: relative;">
    <button class="theme-toggle" aria-label="Toggle theme" style="position: fixed; top: var(--space-4); right: var(--space-4); z-index: 1000; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); border-radius: 50%; border: 1px solid var(--border); color: #fff;"></button>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header" style="margin-bottom: var(--space-8);">
                <a href="index.html" class="auth-logo" aria-label="Home" style="display: flex; flex-direction: row; align-items: center; justify-content: center; text-decoration: none; gap: var(--space-3);">
                    <img src="assets/logo/logo-transparent.svg" alt="The Comedy Hub logo" class="logo-img" width="52" height="52">
                    <span style="font-family: var(--font-heading); font-size: clamp(1.25rem, 4vw, 1.75rem); font-weight: 800; color: var(--accent); letter-spacing: 1px; white-space: nowrap;">The Comedy Hub</span>
                </a>
                <p class="auth-subtitle" style="margin-top: var(--space-4);">Join us to book tickets and save your favorite shows.</p>
            </div>

            <form id="signup-form" novalidate>
                <div class="form-group" id="first-name-group">
                    <label class="form-label" for="signup-first-name">First Name</label>
                    <input type="text" id="signup-first-name" class="form-control" required placeholder="Jane" autocomplete="given-name">
                    <span class="form-feedback">Please enter your first name.</span>
                </div>

                <div class="form-group" id="last-name-group">
                    <label class="form-label" for="signup-last-name">Last Name</label>
                    <input type="text" id="signup-last-name" class="form-control" required placeholder="Doe" autocomplete="family-name">
                    <span class="form-feedback">Please enter your last name.</span>
                </div>

                <div class="form-group" id="email-group">
                    <label class="form-label" for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" class="form-control" required placeholder="you@example.com" autocomplete="email">
                    <span class="form-feedback">Please enter a valid email address.</span>
                </div>

                <div class="form-group" id="password-group">
                    <label class="form-label" for="signup-password">Password</label>
                    <input type="password" id="signup-password" class="form-control" required placeholder="••••••••" autocomplete="new-password">
                    <span class="form-feedback">Password must be at least 8 characters long.</span>
                </div>

                <div class="form-group" id="confirm-password-group">
                    <label class="form-label" for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" class="form-control" required placeholder="••••••••" autocomplete="new-password">
                    <span class="form-feedback" id="confirm-feedback">Passwords do not match.</span>
                </div>

                <div class="form-group" id="terms-group" style="margin: var(--space-6) 0;">
                    <label class="checkbox-container">
                        <input type="checkbox" id="signup-terms" required>
                        <span>I agree to the <a href="#" style="color: var(--accent); text-decoration: underline;">Terms & Conditions</a> and <a href="#" style="color: var(--accent); text-decoration: underline;">Privacy Policy</a>.</span>
                    </label>
                    <span class="form-feedback" id="terms-feedback">You must agree to continue.</span>
                </div>

                <button type="submit" class="btn btn-primary" id="signup-submit" style="width: 100%;">Create Account</button>
            </form>

            <div class="social-divider">OR</div>

            <div class="social-buttons">
                <button class="btn-social" type="button">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.9 2.25c1.7-1.57 2.69-3.88 2.69-6.6z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.25c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.58-5.05-3.71L.93 13.04C2.42 16 5.46 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.95 10.72c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72L.93 4.96C.34 6.13 0 7.53 0 9s.34 2.87.93 4.04l3.02-2.32z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.46 0 2.42 2 1.93 4.96L3.02 7.28c.71-2.13 2.7-3.7 5.05-3.7z"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('signup-form');
            const firstNameInput = document.getElementById('signup-first-name');
            const lastNameInput = document.getElementById('signup-last-name');
            const emailInput = document.getElementById('signup-email');
            const passwordInput = document.getElementById('signup-password');
            const confirmPasswordInput = document.getElementById('signup-confirm-password');
            const termsCheckbox = document.getElementById('signup-terms');
            const submitBtn = document.getElementById('signup-submit');

            // Reset validation states on input
            const inputs = [firstNameInput, lastNameInput, emailInput, passwordInput, confirmPasswordInput, termsCheckbox];
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    if(input.type === 'checkbox') {
                        input.closest('.form-group').classList.remove('has-error');
                    } else {
                        input.parentElement.classList.remove('has-error');
                        input.parentElement.classList.remove('has-success');
                    }
                });
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;

                // Terms validation
                if (!termsCheckbox.checked) {
                    termsCheckbox.closest('.form-group').classList.add('has-error');
                    isValid = false;
                }

                // First Name validation
                if (!firstNameInput.value.trim()) {
                    firstNameInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else {
                    firstNameInput.parentElement.classList.add('has-success');
                }

                // Last Name validation
                if (!lastNameInput.value.trim()) {
                    lastNameInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else {
                    lastNameInput.parentElement.classList.add('has-success');
                }
                
                // Email validation
                const emailPattern = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
                if (!emailInput.value.trim() || !emailPattern.test(emailInput.value)) {
                    emailInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else {
                    emailInput.parentElement.classList.add('has-success');
                }

                // Password strength validation (minimum 8 characters)
                if (!passwordInput.value || passwordInput.value.length < 8) {
                    passwordInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else {
                    passwordInput.parentElement.classList.add('has-success');
                }

                // Password match validation
                if (!confirmPasswordInput.value || confirmPasswordInput.value !== passwordInput.value) {
                    confirmPasswordInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else if (confirmPasswordInput.value.length >= 8) {
                    confirmPasswordInput.parentElement.classList.add('has-success');
                }

                if (isValid) {
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Creating Account...';
                    submitBtn.disabled = true;

                    // Simulate API call
                    setTimeout(() => {
                        submitBtn.textContent = 'Success!';
                        submitBtn.style.backgroundColor = 'var(--success)';
                        submitBtn.style.borderColor = 'var(--success)';
                        submitBtn.style.color = '#fff';
                        
                        // Fake redirect to login
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1000);
                    }, 1200);
                }
            });
        });
    </script>
</body>
</html>
