<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Comedy Hub</title>
    
        <link rel="icon" type="image/svg+xml" href="assets/logo/favicon-32x32.svg">
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="assets/logo/favicon-16x16.svg">
    <link rel="icon" type="image/svg+xml" sizes="48x48" href="assets/logo/favicon-48x48.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/rtl.css" media="all">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
            background: radial-gradient(circle at center, var(--bg-primary), var(--bg-secondary));
        }
        
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            box-shadow: var(--shadow-lg);
            transition: all var(--transition-normal);
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card:hover {
            box-shadow: 0 40px 80px -12px rgba(0, 0, 0, 0.7), var(--shadow-neon-hover);
            border-color: rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-4);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: var(--space-6);
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--space-2);
            display: block;
        }

        .form-control {
            background: var(--bg-primary);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            width: 100%;
            transition: all var(--transition-fast);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
            opacity: 1;
        }

        .form-control:focus {
            background: var(--bg-primary);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.15);
            outline: none;
            transform: scale(1.01);
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: var(--space-4) 0 var(--space-6);
            font-size: 0.875rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .checkbox-container:hover {
            color: var(--text-primary);
        }

        .forgot-link {
            color: var(--accent);
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .btn-primary {
            padding: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: var(--shadow-glow);
        }

        .social-divider {
            display: flex;
            align-items: center;
            margin: var(--space-8) 0;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-divider::before, .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-divider::before { margin-right: 1.5rem; }
        .social-divider::after { margin-left: 1.5rem; }

        .social-buttons {
            display: flex;
            gap: var(--space-2);
        }

        .btn-social {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px;
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            gap: 8px;
        }

        .btn-social:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-8);
            padding-top: var(--space-6);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 700;
            margin-left: 4px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .form-feedback {
            font-size: 0.8125rem;
            color: #ff4d4d;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        .has-error .form-feedback { display: block; }
        .has-error .form-control { border-color: #ff4d4d; background: rgba(255, 77, 77, 0.05); }

        /* Auth Toggles Contrast */
        .auth-toggles .theme-toggle, 
        .auth-toggles .rtl-toggle {
            color: #f8fafc !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
        }

        .auth-toggles .theme-toggle:hover,
        .auth-toggles .rtl-toggle:hover {
            background: rgba(255, 255, 255, 0.1) !important;
            color: var(--accent) !important;
        }

        .auth-toggles .rtl-toggle.active {
            background: var(--accent) !important;
            color: #fff !important;
        }

        @media (max-width: 480px) {
            .auth-toggles {
                top: 0.75rem !important;
                right: 0.75rem !important;
                gap: 0.5rem !important;
            }
            .theme-toggle, .rtl-toggle {
                transform: scale(0.85);
            }
        }

        body.page-auth {
            padding-top: 0 !important;
        }
    </style>
</head>
<body class="page-auth">
    <!-- Floating Toggles (Replacing Header Actions) -->
    <div class="auth-toggles" style="position: fixed; top: 1.5rem; right: 1.5rem; display: flex; gap: var(--space-2); z-index: var(--z-max);">
        <button class="theme-toggle" aria-label="Toggle theme"></button>
        <button class="rtl-toggle" aria-label="Toggle RTL mode">RTL</button>
    </div>

    <main class="auth-container" style="padding: var(--space-8) var(--space-4);">
        <div class="auth-card">
            <div class="auth-header" style="margin-bottom: var(--space-8);">
                <a href="index.html" class="auth-logo" style="display: flex; flex-direction: row; align-items: center; justify-content: center; text-decoration: none; gap: var(--space-3); margin-bottom: var(--space-6);">
                    <img src="assets/logo/logo-transparent.svg" alt="The Comedy Hub logo" class="logo-img" width="56" height="56">
                    <span style="font-family: var(--font-heading); font-size: clamp(1.25rem, 4vw, 1.85rem); font-weight: 800; color: var(--accent); letter-spacing: 1px; white-space: nowrap;">The Comedy Hub</span>
                </a>
                <h1 style="font-size: 2rem; color: var(--text-primary); margin-bottom: 0.5rem; font-family: var(--font-heading); font-weight: 800;">Login</h1>
                <p class="auth-subtitle">Sign in to book tickets and manage your account.</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group" id="email-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-control" required placeholder="you@example.com" autocomplete="email">
                    <span class="form-feedback">Please enter a valid email address.</span>
                </div>

                <div class="form-group" id="password-group" style="margin-bottom: var(--space-4);">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
                    <div style="text-align: right; margin-top: 8px;">
                        <a href="#" class="forgot-link" style="font-size: 0.8125rem;">Forgot password?</a>
                    </div>
                    <span class="form-feedback">Password must be at least 6 characters.</span>
                </div>

                <div class="auth-options" style="margin-top: var(--space-4);">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" id="login-submit" style="width: 100%;">Login</button>
            </form>

            <div class="social-divider">OR</div>

            <div class="social-buttons">
                <button class="btn-social" type="button">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.9 2.25c1.7-1.57 2.69-3.88 2.69-6.6z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.25c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.58-5.05-3.71L.93 13.04C2.42 16 5.46 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.95 10.72c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72L.93 4.96C.34 6.13 0 7.53 0 9s.34 2.87.93 4.04l3.02-2.32z"/>
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.46 0 2.42 2 1.93 4.96L3.02 7.28c.71-2.13 2.7-3.7 5.05-3.7z"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const submitBtn = document.getElementById('login-submit');

            // Set up real-time validation removal
            [emailInput, passwordInput].forEach(input => {
                input.addEventListener('input', () => {
                    input.parentElement.classList.remove('has-error');
                    input.parentElement.classList.remove('has-success');
                });
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;
                
                // Email validation
                const emailPattern = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
                if (!emailInput.value.trim() || !emailPattern.test(emailInput.value)) {
                    emailInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else {
                    emailInput.parentElement.classList.add('has-success');
                }

                // Password validation (just check length for login)
                if (!passwordInput.value.trim() || passwordInput.value.length < 6) {
                    passwordInput.parentElement.classList.add('has-error');
                    isValid = false;
                } else {
                    passwordInput.parentElement.classList.add('has-success');
                }

                if (isValid) {
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Logging in...';
                    submitBtn.disabled = true;

                    // Simulate API call
                    setTimeout(() => {
                        submitBtn.textContent = 'Success!';
                        submitBtn.style.backgroundColor = 'var(--success)';
                        submitBtn.style.borderColor = 'var(--success)';
                        submitBtn.style.color = '#fff';
                        
                        // Fake redirect
                        setTimeout(() => {
                            window.location.href = 'dashboard/user.html';
                        }, 500);
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
